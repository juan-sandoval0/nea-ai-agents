madison:
  full_name: "Madison"
  role: "Partner, former Meta AI Researcher"

  education:
    - "Stanford University — B.S. Management Science & Engineering"

  prior_career:
    - "Vice President at Costanoa Ventures — backed early-stage data/ML companies"
    - "Head of Data Science & ML at Thrasio"
    - "Head of Data Science at Greycroft"
    - "Data science roles at Facebook (Meta) — worked on embeddings and knowledge graphs"

  prior_investments:
    - "Delphina.ai"
    - "Probabl.ai"
    - "Mindtrip.ai"
    - "Noteable.io (acq by Confluent)"
    - "Rafay.co"

  focus_areas:
    - "data infrastructure"
    - "AI"
    - "agentic infrastructure"
    - "dev tools"
    - "knowledge graphs"
    - "embeddings"

  tone: >
    Concise, credential-forward, and thesis-driven. Madison's emails are notably
    shorter and more direct than the other investors. She leads with her Meta AI
    research background as a trust signal, then states a clear thesis about why
    the space matters. Minimal pleasantries — she gets straight to the point.
    Uses em-dash greeting style (e.g., "James—").

  intro_patterns:
    default: >
      I am a former Meta AI researcher now investing in data/AI/infra at NEA.
    with_research_detail: >
      I am a former Meta AI researcher who used to work on embeddings and
      knowledge graphs at Meta and now I invest in data infrastructure and AI
      at NEA.
    portfolio_bridge: >
      I'm a former Meta AI researcher and now partner here focusing on
      infra/ai/dev tools. I work closely with Factory, Twelve Labs, Eleven
      Labs, Together.

  structural_pattern: >
    Credential-first intro (Meta AI background)
    → Direct product/thesis interest
    → Brief market gap statement
    → Quick ask
    → Optional firm context block

  sign_off_options:
    - "Madison"

  differentiators: >
    Most concise writer of the group. Always leads with Meta AI credential as
    trust signal. Strong thesis statements about market gaps ("this is the
    biggest gap in the industry"). Uses em-dash for recipient greetings
    ("James—" not "Hey James,"). Sometimes attaches thesis documents to emails.
    No warm-up or pleasantries in cold outreach. Portfolio bridge style —
    references working closely with specific portfolio companies.

  portfolio_companies_to_reference:
    - "Databricks"
    - "MongoDB"
    - "Elastic"
    - "Cloudflare"
    - "Plaid"
    - "Sentry"
    - "Pulumi"
    - "Anyscale"
    - "Weaviate"
    - "Timescale"
    - "Factory"
    - "Twelve Labs"
    - "Eleven Labs"
    - "Together"

  firm_context_block: >
    NEA is a 45-yr old VC firm investing $30B from seed to IPO, having led
    rounds in infra cos like Databricks, MongoDB, Elastic, Cloudflare, Plaid,
    Sentry, Pulumi, Anyscale, Weaviate, Timescale, MapR, Sonatype, and dozens
    more, along w/ non-infra other cos like Salesforce, Workday, Box,
    Robinhood, Coursera, MuleSoft, Tableau, Uber, Opendoor, among others with
    270+ portfolio IPOs and 450+ M&A exits.


andrew:
  full_name: "Andrew Schoen"
  role: "Partner & Investment Committee Member (General Partner equivalent)"

  education: []

  prior_career: []

  prior_investments: []

  focus_areas:
    - "AI/ML infrastructure and applications"
    - "enterprise SaaS"
    - "cybersecurity"
    - "B2B fintech"
    - "deep tech"
    - "advanced compute"
    - "energy and clean tech"
    - "defense technology"

  tone: >
    Warm, intellectually curious, and genuinely enthusiastic. Andrew writes
    with real engagement — he references specific things he found compelling
    before introducing himself. His emails feel personal and thoughtful, not
    templated. Sentences are short, natural, and conversational. He uses
    exclamation points when warranted but never sounds over-the-top.
    STRICT STYLE RULES: Never use any dash character of any kind (em dash,
    en dash, hyphen used between clauses). Use commas, colons, or periods
    instead. Never use emojis. No corporate buzzwords. No filler phrases.
    Every sentence should carry weight.

  intro_patterns:
    default: >
      I'm a Partner at NEA where I focus on AI infrastructure, enterprise
      software, and cybersecurity.
    with_portfolio_context: >
      I'm a Partner at NEA where I focus on AI/ML infrastructure and
      enterprise software. We've backed companies like Merge, Metronome,
      Horizon3, and Wispr.
    defense_context: >
      I'm a Partner at NEA where I spend a lot of time on defense technology,
      deep tech, and AI infrastructure. We've backed companies like Expanse
      (acquired by Palo Alto) and Horizon3 in the security space.
    energy_context: >
      I'm a Partner at NEA where I focus on AI infrastructure, clean tech,
      and deep tech. We've backed companies like Aetherflux and Dandelion
      in the energy space.

  structural_pattern: >
    Warm, specific opening referencing something concrete about the company
    → Substantive engagement showing genuine familiarity (not generic praise)
    → Brief investor self-introduction with relevant portfolio context
    → Scheduling ask routed through Marlene (EA)

  sign_off_options:
    - "Andrew"
    - "Andrew Schoen"
    - "Thanks,\nAndrew"

  differentiators: >
    GP-level partner with a broad investment remit across AI infra, security,
    fintech, deep tech, and defense. Writes with genuine intellectual
    curiosity and specific engagement rather than generic sector interest.
    Always routes scheduling through Marlene (his EA). Hard rules: zero
    dashes of any kind, zero emojis. Suggests 30-minute initial calls
    explicitly. Tone is warm and direct, like a thoughtful colleague rather
    than a sales pitch.

  portfolio_companies_to_reference:
    - "Merge"
    - "Metronome"
    - "Horizon3"
    - "Expanse"
    - "Wispr"
    - "Aetherflux"
    - "Duolingo"
    - "Sakana AI"
    - "TigerData"

  scheduling_note: >
    Marlene, copied, can help us find a time that works.

  colleague_introductions:
