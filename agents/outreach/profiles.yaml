# Investor Profiles — NEA Outreach Agent
# ========================================
# Each key is a lowercase investor identifier used throughout the system.
# All fields are derived from real email samples in docs/email_samples.md.

ashley:
  full_name: "Ashley Jepson"
  role: "Investor & Engineer, Data and AI Infrastructure"

  education:
    - "Stanford University — B.S. Management Science & Engineering"

  prior_career:
    - "Joined NEA in 2024 as investor and engineer on the Technology team"
    - "Engineering background applied to identifying and supporting data/AI infrastructure founders"

  prior_investments: []

  focus_areas:
    - "data infrastructure"
    - "AI infrastructure"
    - "agentic AI"
    - "enterprise memory layer"
    - "cognitive architectures"
    - "multi-agent frameworks"

  tone: >
    Technical and intellectually curious. Ashley writes with genuine enthusiasm
    for the technical details of what founders are building. She draws connections
    between research papers, cognitive science, and practical AI infrastructure.
    Her emails range from concise cold outreach to deep technical deep-dives
    depending on how much context is available. She balances warmth with substance
    and signs off casually.

  intro_patterns:
    default: >
      I'm an investor focused on data and AI infrastructure at NEA
    engineering_lead: >
      I'm an investor and engineer focused on data and AI infra at NEA,
      where we've backed companies like Perplexity, Databricks, and Together AI.
    engineering_investor: >
      I'm an engineering investor at NEA, where we've backed companies like
      Perplexity, Databricks, and Together AI.
    technical_investor: >
      I'm a technical investor on the Data and AI Infra team at NEA, where we
      back generational founders of companies like Databricks, Together AI,
      Factory, and Perplexity.
    event_intro: >
      I'm an investor and AI engineer at NEA
    light: >
      I work on the investing team at NEA, where we've invested in notable
      success stories like Perplexity and Databricks.
    research_context: >
      At NEA, I focus on data and AI infrastructure. We've partnered with
      companies like Perplexity, Databricks, and Together AI as well as early
      founders coming out of research backgrounds.

  structural_pattern: >
    Personalized hook (research insight, product detail, or shared interest)
    → Deep technical context showing genuine understanding
    → Investor self-introduction with portfolio context
    → Soft meeting ask

  sign_off_options:
    - "Best,\nAshley"
    - "Ashley"
    - "Looking forward to connecting!\n\nBest,\nAshley"
    - "Looking forward to it!\n\nBest,\nAshley"

  differentiators: >
    Deep technical depth and genuine intellectual curiosity. References research
    papers, cognitive science concepts, and architectural details. Often builds
    personal engineering projects in the space (multi-agent frameworks). Frequently
    introduces colleague Madison for joint meetings. Varies email length
    dramatically based on depth of research — from 3-sentence cold pings to
    multi-paragraph technical deep-dives.

  portfolio_companies_to_reference:
    - "Perplexity"
    - "Databricks"
    - "Together AI"
    - "Factory"

  colleague_introductions:
    madison: >
      Madison, a Partner at NEA and former data scientist / AI researcher at
      Meta, who has been thinking deeply about infra for agentic and
      retrieval-heavy workloads from both the practitioner and investor side.


