# Databricks Asset Bundle — NEA AI Platform batch jobs.
#
# STATUS: DOCUMENTATION ONLY — NOT CURRENTLY DEPLOYED.
#
# This bundle was validated and deploy-tested against a Databricks Free
# Edition workspace in 2026-04. It does not run there: Free Edition allows
# only serverless compute, and serverless has restricted DNS egress that
# cannot reach Supabase / Anthropic / OpenAI / Harmonic / Parallel /
# Tavily. The paid-tier escape hatches (Network Connectivity Configuration
# for serverless, or classic job clusters with unrestricted egress) are
# both unavailable on Free Edition — the workspace rejects classic-cluster
# deploys with "Only serverless compute is supported in the workspace."
#
# The batch scheduler for news_refresh and investor_digest is therefore
# GitHub Actions (see .github/workflows/news_refresh.yml and
# investor_digest.yml). The notebooks under notebooks/batch/ contain the
# real production logic and remain deployable on a paid Databricks tier
# without code changes.
#
# To re-activate Databricks as the scheduler on a paid tier:
#   1. Attach a Network Connectivity Configuration (NCC) to the workspace
#      allowlisting the external hosts above, OR switch the job_clusters
#      block below to a classic cluster.
#   2. databricks bundle deploy --target prod
#   3. Unpause the two schedules (currently pause_status: PAUSED).
#
# Deploy:     databricks bundle deploy --target prod
# Validate:   databricks bundle validate --target dev
# Run once:   databricks bundle run news_refresh --target prod

bundle:
  name: nea-ai-platform

variables:
  notification_email:
    description: "Email to notify on job failure"
    default: ""
  node_type_id:
    description: "EC2 node type for job clusters"
    default: "m5.large"
  spark_version:
    description: "Databricks Runtime version"
    default: "15.4.x-scala2.12"

sync:
  include:
    - agents/**
    - core/**
    - tools/**
    - services/**
    - notebooks/batch/**
  exclude:
    - "**/__pycache__/**"
    - "**/*.pyc"
    - "**/*.db"
    - .git/**
    - frontend/**
    - api/**

resources:
  jobs:
    news_refresh:
      name: nea-news-refresh
      description: >
        Checks all watched companies for new signals and generates the
        investor digest. Replaces the Railway threading.Thread background task
        in services/api.py::_run_news_refresh_job.
      schedule:
        quartz_cron_expression: "0 0 */6 * * ?"  # every 6 hours
        timezone_id: "America/Los_Angeles"
        pause_status: PAUSED  # unpause after end-to-end verified
      max_concurrent_runs: 1
      timeout_seconds: 3600
      job_clusters:
        - job_cluster_key: batch_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: 0   # single-node; driver-only
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode
            data_security_mode: SINGLE_USER
      tasks:
        - task_key: refresh
          job_cluster_key: batch_cluster
          notebook_task:
            notebook_path: ./notebooks/batch/news_refresh.py
            base_parameters:
              days: "7"
              refresh_competitors: "true"
          libraries:
            - pypi:
                package: "langchain>=0.1.0"
            - pypi:
                package: "langchain-core>=0.1.0"
            - pypi:
                package: "langchain-anthropic>=0.1.0"
            - pypi:
                package: "langchain-openai>=0.0.5"
            - pypi:
                package: "langsmith>=0.0.77"
            - pypi:
                package: "openai>=1.0.0"
            - pypi:
                package: "python-dotenv>=1.0.0"
            - pypi:
                package: "python-dateutil>=2.8.0"
            - pypi:
                package: "aiohttp>=3.8.0"
            - pypi:
                package: "tavily-python>=0.5.0"
            - pypi:
                package: "parallel-web>=0.4.0"
            - pypi:
                package: "supabase>=2.0.0"
            - pypi:
                package: "pydantic>=2.0.0"
            - pypi:
                package: "pyyaml>=6.0"

    investor_digest:
      name: nea-investor-digest
      description: >
        Weekly clustering + summarization of signals into the investor digest.
        Replaces the synchronous GET /api/digest/weekly call path.
      schedule:
        quartz_cron_expression: "0 0 9 ? * MON"  # Mondays at 09:00 PT
        timezone_id: "America/Los_Angeles"
        pause_status: PAUSED  # unpause after end-to-end verified
      max_concurrent_runs: 1
      timeout_seconds: 3600
      job_clusters:
        - job_cluster_key: batch_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode
            data_security_mode: SINGLE_USER
      tasks:
        - task_key: digest
          job_cluster_key: batch_cluster
          notebook_task:
            notebook_path: ./notebooks/batch/investor_digest.py
            base_parameters:
              days: "7"
          libraries:
            - pypi:
                package: "langchain>=0.1.0"
            - pypi:
                package: "langchain-core>=0.1.0"
            - pypi:
                package: "langchain-anthropic>=0.1.0"
            - pypi:
                package: "langchain-openai>=0.0.5"
            - pypi:
                package: "langsmith>=0.0.77"
            - pypi:
                package: "openai>=1.0.0"
            - pypi:
                package: "python-dotenv>=1.0.0"
            - pypi:
                package: "python-dateutil>=2.8.0"
            - pypi:
                package: "aiohttp>=3.8.0"
            - pypi:
                package: "tavily-python>=0.5.0"
            - pypi:
                package: "parallel-web>=0.4.0"
            - pypi:
                package: "supabase>=2.0.0"
            - pypi:
                package: "pydantic>=2.0.0"
            - pypi:
                package: "pyyaml>=6.0"

targets:
  dev:
    mode: development
    default: true
    resources:
      jobs:
        news_refresh:
          schedule:
            pause_status: PAUSED
        investor_digest:
          schedule:
            pause_status: PAUSED

  prod:
    mode: production
    workspace:
      root_path: /Shared/nea-ai-platform
    run_as:
      user_name: ${workspace.current_user.userName}
